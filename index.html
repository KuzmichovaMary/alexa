<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>My Website</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sacramento&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
  </head>
  <body>
    <main>
      <canvas id="world" style="position:fixed; top:0;left:0" ></canvas>
        <div class="tags">

    <div class="tag-container">
        <div class="tag">

            <div class="tag-side tag-1-side">
                <div class="tag-1-top"></div>
                <div class="tag-text tag-1-text">
                    Merry<br />Christmas
                    <div class="rule-shape rule-red">&#10052;</div>
                </div>
            </div>

            <div class="tag-side tag-1-side is-back">
                <div class="tag-1-top"></div>
                <div class="tag-text tag-1-text">
                    I gift you a stickers)
                    But you need to draw them,
                    and i will do everything else.
                </div>
            </div>

        </div>
    </div>

    <div class="tag-container">
        <div class="tag">

            <div class="tag-side tag-2-side">
                <div class="tag-text tag-2-text">
                    Lets go skiing
                    <div class="rule-diagonal"></div>
                </div>
            </div>

            <div class="tag-side tag-2-side is-back">
                <div class="tag-text tag-2-text">
                    And make some ginger breads :)
                    <div class="rule-diagonal"></div>
                </div>
            </div>

        </div>
    </div>

    <div class="tag-container">
        <div class="tag">

            <div class="tag-side tag-3-side">
                <div class="tag-text tag-3-text">
                    You<br />will have 5 at history
                    <div class="rule-shape">&#10052;</div>
                </div>
            </div>

            <div class="tag-side tag-3-side is-back">
                <div class="tag-text tag-3-text">
                    Sorry for such a small present.
                    With love, Mary
                    <div class="rule-shape">&#10052;</div>
                </div>
            </div>

        </div>
    </div>

</div> 

    </main>
    <script src="script.js"></script>
  </body>
</html>
